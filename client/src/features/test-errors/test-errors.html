<div class="flex justify-center gap-3 pt-10">
    <button class="btn btn-neutral" (click)="get404Error()">404 Error</button>
    <button class="btn btn-accent" (click)="get401Error()">401 Error</button>
    <button class="btn btn-secondary" (click)="get400Error()">400 Error</button>
    <button class="btn btn-success" (click)="get500Error()">500 Error</button>
    <button class="btn btn-info" (click)="get401ValidationError()">401 Validation Error</button>
</div>
@if(validationError().length > 0) {
    <div class="card bg-base-100 flex mt-5 rounded-2xl w-1/2 p-3 mx-auto">
        <ul class="flex flex-col text-red-600 space-y-2">
           @for (error of validationError(); track $index) {
            <li>{{ error }}</li>
           }
        </ul>
    </div>
}
